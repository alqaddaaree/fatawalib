# .pages.yml
media: false
content:

  - name: scholars
    label: Scholars
    type: collection
    path: src/content/scholars
    operations:
      create: true
      delete: true
    filename: '{name}.yaml'
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: arabicName
        label: Arabic Name
        type: string
        required: true
      - name: lifespan
        label: Lifespan
        type: string
        required: true
      - name: bio
        label: Biography
        type: text
        required: true

  - name: fatwas
    label: Fatwas
    type: collection
    path: src/content/fatwas
    operations:
      create: true
      delete: true
    filename: '{scholar}-{title}.yaml'
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: scholar
        label: Scholar
        type: reference
        collection: scholars
        required: true
      - name: categories
        label: Categories
        type: string
        list: true
        required: true
      - name: question
        label: Question
        type: rich-text
        description: 'The question being asked'
      - name: answer
        label: Answer
        type: rich-text
        description: 'The translated answer'
      - name: arabic_question
        label: Arabic Question
        type: text
        multiline: true
        default: ''
      - name: arabic_answer
        label: Arabic Answer
        type: text
        multiline: true
        default: ''
      - name: source_url
        label: Source URL
        type: string
      - name: translator
        label: Translator
        type: string
      - name: reviewer
        label: Reviewer
        type: string
        default: ''
      - name: date_issued
        label: Date Issued (Hijri or ISO)
        type: string
      - name: date_issued_gregorian
        label: Date Issued (Gregorian)
        type: string
      - name: date_added
        label: Date Added
        type: date
        required: true
      - name: audience
        label: Audience
        type: select
        options:
          - label: General
            value: general
          - label: Advanced
            value: advanced
        default: general
      - name: tags
        label: Tags
        type: string
        list: true
      - name: footnotes
        label: Footnotes
        type: rich-text
        description: 'Additional footnotes or references'
      - name: notes
        label: Notes
        type: rich-text
        description: 'Any additional notes about the fatwa'