media: false
collections:
  - name: scholars
    label: Scholars
    path: src/content/scholars
    create: true
    delete: true
    filename: "{name}.yaml"
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: arabicName
        label: Arabic Name
        type: string
        required: true
      - name: lifespan
        label: Lifespan
        type: string
        required: true
      - name: bio
        label: Biography
        type: text
        required: true
        multiline: true

  - name: fatwas
    label: Fatwas
    path: src/content/fatwas
    create: true
    delete: true
    filename: "{id}.yaml"
    fields:
      - name: id
        label: Slug (ID)
        type: string
        required: true
        hint: "Unique slug, e.g., ibn-baz-praying-with-shoes"
      - name: title
        label: Title
        type: string
        required: true
      - name: scholar
        label: Scholar ID
        type: string
        required: true
        hint: "Enter scholar slug, e.g., ibn-baz"
      - name: categories
        label: Categories
        type: string
        required: true
        hint: "Comma separated: Prayer, Purification"
      - name: question
        label: Question
        type: text
        multiline: true
      - name: answer
        label: Answer
        type: text
        multiline: true
      - name: arabic_question
        label: Arabic Question
        type: text
        multiline: true
        default: ""
      - name: arabic_answer
        label: Arabic Answer
        type: text
        multiline: true
        default: ""
      - name: source_url
        label: Source URL
        type: string
      - name: translator
        label: Translator
        type: string
      - name: reviewer
        label: Reviewer
        type: string
        default: ""
      - name: date_issued
        label: Date Issued (Hijri or ISO)
        type: string
      - name: date_issued_gregorian
        label: Date Issued (Gregorian)
        type: string
      - name: date_added
        label: Date Added
        type: date
        required: true
      - name: audience
        label: Audience
        type: select
        options:
          - general
          - advanced
        default: general
      - name: tags
        label: Tags
        type: string
        hint: "Comma separated: prayer, shoes"
      - name: footnotes
        label: Footnotes
        type: text
        multiline: true
      - name: notes
        label: Notes
        type: text
        multiline: true