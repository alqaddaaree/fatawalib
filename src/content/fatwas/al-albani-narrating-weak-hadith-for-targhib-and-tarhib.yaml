title: Narrating Weak Hadith for Targhīb and Tarhīb
scholar: al-albani
categories:
  - Hadith Sciences
  - Methodology
question: What is the ruling on narrating weak hadith for the purposes of
  encouragement and warnings?
answer: >
  Narrating weak hadith for targhīb and tarhīb is not permissible in my view,
  contrary to what many scholars have permitted. This is because the condition
  they set — that one must clarify the weakness of the hadith — is rarely
  observed in practice. Most people who cite weak hadith for encouragement do
  not clarify their weakness, and so listeners assume they are established
  narrations from the Prophet ﷺ.


  The Prophet ﷺ said: "Lying about me is not like lying about anyone else.
  Whoever lies about me intentionally, let him take his seat in the Hellfire."
  This is a severe warning against attributing to the Prophet ﷺ anything that is
  not authentically established from him.


  The Qurān and the authentic Sunnah contain sufficient encouragement and
  warning without needing to resort to weak narrations. Whoever seeks to
  encourage people toward good or warn them from evil has an abundance of
  authentic texts at his disposal.


  And Allāh knows best.
