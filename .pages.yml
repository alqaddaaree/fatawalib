# .pages.yml
# No media: false - just omit it entirely
content:
  - name: scholars
    label: Scholars
    type: collection
    path: src/content/scholars
    create: true
    delete: true
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: arabicName
        label: Arabic Name
        type: string
        required: true
      - name: lifespan
        label: Lifespan
        type: string
        required: true
      - name: bio
        label: Biography
        type: text
        required: true

  - name: fatwas
    label: Fatwas
    type: collection
    path: src/content/fatwas
    create: true
    delete: true
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: scholar
        label: Scholar
        type: string
        required: true
      - name: categories
        label: Categories
        type: string
        required: true
      - name: question
        label: Question
        type: text
        required: true
      - name: answer
        label: Answer
        type: text
        required: true
      - name: arabic_question
        label: Arabic Question
        type: text
      - name: arabic_answer
        label: Arabic Answer
        type: text
      - name: source_url
        label: Source URL
        type: string
      - name: translator
        label: Translator
        type: string
      - name: reviewer
        label: Reviewer
        type: string
      - name: date_issued
        label: Date Issued (Hijri or ISO)
        type: string
      - name: date_issued_gregorian
        label: Date Issued (Gregorian)
        type: string
      - name: date_added
        label: Date Added
        type: date
        required: true
      - name: audience
        label: Audience
        type: select
        options:
          - label: General
            value: general
          - label: Advanced
            value: advanced
        default: general
      - name: tags
        label: Tags
        type: string
      - name: footnotes
        label: Footnotes
        type: text
      - name: notes
        label: Notes
        type: text